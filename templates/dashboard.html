<!DOCTYPE html>

<head>

<link rel="stylesheet"

<body>


<nav class="navbar">

    <div class="logo">
        🌿 Green Vocabulary AI

    <div class="nav-links">

        </a>

        <a href="/chat-history-page">

Words Learned

0
</span>

</div>

<div class="icon">
🌱

Eco Learning

<span>
