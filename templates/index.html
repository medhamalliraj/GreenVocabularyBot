<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Green Vocabulary AI</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <!-- Header -->

    <header class="header">

        <div class="logo-area">

            <div class="logo">
                🌿
            </div>

            <div class="title">

                <h2>Green Vocabulary AI</h2>

                <p>Learn Sustainability with AI</p>

            </div>

        </div>

        <div class="header-actions">

            <button id="dashboardBtn" class="top-btn">
                📊 Dashboard
            </button>

            <button id="historyBtn" class="top-btn">
                📚 Vocabulary
            </button>

            <button id="chatHistoryBtn" class="top-btn">
                💬 Chats
            </button>

            <button id="themeToggle" class="theme-btn">
                🌙
            </button>

            <button id="logoutBtn" class="logout-btn">
                Logout
            </button>

        </div>

    </header>

    <!-- Chat -->

    <main id="chat-box" class="chat-box">

        <!-- Messages appear here -->

    </main>

    <!-- Typing -->

    <div id="typing" class="typing hidden">

        <div class="avatar bot-avatar">
            🌿
        </div>

        <div class="typing-bubble">

            <span></span>
            <span></span>
            <span></span>

        </div>

    </div>

    <!-- Input -->

    <div class="input-area">

        <input

            id="user-input"

            type="text"

            placeholder="Ask anything about nature, sustainability or green vocabulary..."

        >

        <button id="send-btn">

            ➤

        </button>

    </div>

</div>

<!-- Vocabulary Modal -->

<div id="historyModal" class="history-modal">

    <div class="history-content">

        <div class="history-header">

            <h2>🌿 Vocabulary History</h2>

            <button id="closeHistory" class="close-history">

                ✕

            </button>

        </div>

        <div style="padding:15px;">

            <input

                id="historySearch"

                type="text"

                placeholder="Search words..."

                style="width:100%;padding:12px;border-radius:12px;border:1px solid #ddd;"

            >

        </div>

        <div

            id="historyList"

            class="history-list"

        >

        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
