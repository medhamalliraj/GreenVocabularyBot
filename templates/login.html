<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='auth.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <h1>🌿 Green Vocabulary AI</h1>

        <h2>Login</h2>

        <form id="loginForm">

            <input
                type="email"
                id="email"
                placeholder="Email"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Password"
                required
            >

            <button type="submit">

                Login

            </button>

        </form>

        <p>

            Don't have an account?

            <a href="/signup">

                Create Account

            </a>

        </p>

        <div id="message"></div>

    </div>

</div>

<script src="{{ url_for('static', filename='auth.js') }}"></script>

</body>
</html>
